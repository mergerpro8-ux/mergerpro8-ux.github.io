<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ═══════════════════════════════════════════════════════
       Open Graph — preview יפה בווטסאפ, פייסבוק, טלגרם
       ═══════════════════════════════════════════════════════ -->
  <meta property="og:title"       content="PDF Merger Pro 📄">
  <meta property="og:description" content="מיזוג, עריכה וניהול PDF מקצועי — עברית, ערבית ועוד 8 שפות">
  <meta property="og:image"       content="https://mergerpro8-ux.github.io/preview.png">
  <meta property="og:url"         content="https://mergerpro8-ux.github.io/join/">
  <meta property="og:type"        content="website">

  <!-- Twitter card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="PDF Merger Pro 📄">
  <meta name="twitter:description" content="מיזוג, עריכה וניהול PDF מקצועי">
  <meta name="twitter:image"       content="https://mergerpro8-ux.github.io/preview.png">

  <title>PDF Merger Pro — הורד עכשיו</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0D47A1 0%, #1565C0 50%, #0D47A1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .logo {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #0D47A1;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .redirect-msg {
      background: #E3F2FD;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      color: #0D47A1;
      font-size: 14px;
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #BBDEFB;
      border-top-color: #0D47A1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      display: block;
      background: #0D47A1;
      color: white;
      text-decoration: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: #1565C0; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: #999;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .feature {
      text-align: center;
      font-size: 12px;
      color: #555;
    }

    .feature-icon {
      font-size: 24px;
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<div class="card">
  <span class="logo">📄</span>
  <h1>PDF Merger Pro</h1>
  <p class="subtitle">מיזוג, עריכה וניהול PDF מקצועי<br>עברית, ערבית ועוד 8 שפות</p>

  <div class="features">
    <div class="feature">
      <span class="feature-icon">🔀</span>מיזוג
    </div>
    <div class="feature">
      <span class="feature-icon">✏️</span>עריכה
    </div>
    <div class="feature">
      <span class="feature-icon">🔒</span>הצפנה
    </div>
    <div class="feature">
      <span class="feature-icon">📱</span>QR Code
    </div>
  </div>

  <div class="redirect-msg" id="redirectMsg">
    מעביר אותך ל-Google Play
    <span class="spinner"></span>
  </div>

  <a href="#" class="btn btn-google" id="playBtn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
      <path d="M3.18 23.76c.3.17.64.24.99.2l13.9-11.66L14.16 8.4 3.18 23.76zm16.76-10.51L17.01 11.6l-2.86 2.4 2.86 2.4 2.96-1.72c.85-.48.85-1.71-.03-2.21zM3.06.26C2.75.43 2.5.77 2.5 1.2v21.6c0 .43.25.77.56.94l.1.06 12.1-12.1v-.28L3.16.2l-.1.06z"/>
    </svg>
    הורד ב-Google Play
  </a>

  <p class="footer">
    בלחיצה על הורד תועבר ישירות ל-Google Play Store
  </p>
</div>

<script>
  // ═══════════════════════════════════════════════════════
  // קרא marketer_id מה-URL ובנה קישור Play Store עם referrer
  //
  // תמיכה בשני פורמטים:
  //   /join/john123          ← קישור נקי (recommended)
  //   /join/?id=john123      ← query string
  //   /join/?m=john123       ← קיצור נוסף
  // ═══════════════════════════════════════════════════════

  (function() {
    const APP_ID = 'com.legaldan.pdfmergerpro';
    const BASE_PLAY  = 'https://play.google.com/store/apps/details';
    const BASE_SHORT = 'https://mergerpro8-ux.github.io/join/';

    // חלץ marketer_id
    function getMarketerId() {
      // 1. נסה מ-pathname: /join/john123
      const pathParts = window.location.pathname.replace(/\/$/, '').split('/');
      const lastPart  = pathParts[pathParts.length - 1];
      if (lastPart && lastPart !== 'join' && lastPart !== 'index.html') {
        return lastPart;
      }

      // 2. נסה מ-query string: ?id=john123 או ?m=john123
      const params = new URLSearchParams(window.location.search);
      return params.get('id') || params.get('m') || null;
    }

    function buildPlayUrl(marketerId) {
      let referrer = 'utm_source=affiliate';
      if (marketerId) {
        referrer += '&marketer_id=' + encodeURIComponent(marketerId);
      }
      return BASE_PLAY + '?id=' + APP_ID + '&referrer=' + encodeURIComponent(referrer);
    }

    const marketerId = getMarketerId();
    const playUrl    = buildPlayUrl(marketerId);

    // עדכן כפתור
    document.getElementById('playBtn').href = playUrl;

    // Redirect אוטומטי אחרי 1.5 שניות
    setTimeout(function() {
      window.location.href = playUrl;
    }, 1500);

    // אם אין ID — הסתר ספינר
    if (!marketerId) {
      document.getElementById('redirectMsg').innerHTML = 'מעביר אותך ל-Google Play <span class="spinner"></span>';
    }
  })();
</script>

</body>
</html>
