<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Merger Pro — הצטרף עכשיו</title>

  <meta property="og:title"       content="PDF Merger Pro — הצטרף עכשיו" />
  <meta property="og:description" content="מיזוג, עריכה וחתימה על PDF — ישירות מהנייד. הורד בחינם!" />
  <meta property="og:image"       content="https://mergerpro8-ux.github.io/app_icon.png" />
  <meta property="og:url"         content="https://mergerpro8-ux.github.io/join.html" />
  <meta property="og:type"        content="website" />

  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:     #0A1628;
      --card:   #0F1E38;
      --border: #1A2F52;
      --blue1:  #1565C0;
      --blue2:  #1E3A6E;
      --accent-r: #E53935;
      --accent-o: #FB8C00;
      --accent-y: #FDD835;
      --text:   #E8EEF8;
      --muted:  #5A7AA8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rubik', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* כרטיס ראשי */
    .card {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      border-radius: 24px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
      animation: cardIn 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* פס צבעוני דק בראש הכרטיס */
    .top-stripe {
      height: 3px;
      background: linear-gradient(90deg, var(--accent-r), var(--accent-o), var(--accent-y));
    }

    .card-body {
      padding: 32px 28px 28px;
      text-align: center;
    }

    /* אייקון — עיגול כחול עם ניצוץ כתום קטן */
    .icon-wrap {
      width: 76px; height: 76px;
      margin: 0 auto 20px;
      background: var(--blue2);
      border-radius: 20px;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
      position: relative;
      animation: iconIn 0.5s 0.2s cubic-bezier(.22,1,.36,1) both;
    }

    /* נקודה כתומה קטנה בפינה */
    .icon-wrap::after {
      content: '';
      position: absolute;
      top: 6px; left: 6px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent-o);
      box-shadow: 0 0 8px var(--accent-o);
    }

    @keyframes iconIn {
      from { opacity:0; transform: scale(0.7); }
      to   { opacity:1; transform: scale(1); }
    }

    h1 {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* פיצ'רים — תגיות קטנות כחולות עם אקסנט קטן */
    .features {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 26px;
      flex-wrap: wrap;
    }

    .feat {
      background: rgba(21,101,192,0.15);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: #7BA7D4;
    }

    /* כפתור — כחול רגיל, טקסט עם גרדיאנט חם קטן */
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      background: var(--blue1);
      color: white;
      font-family: 'Rubik', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(21,101,192,0.4);
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    /* ניצוץ צהוב-כתום קטן בצד שמאל של הכפתור */
    .btn::before {
      content: '▶';
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      background: linear-gradient(90deg, var(--accent-o), var(--accent-y));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn:hover  { background: #1976D2; transform: translateY(-2px); box-shadow: 0 6px 28px rgba(21,101,192,0.55); }
    .btn:active { transform: translateY(0); }

    /* ספירה לאחור */
    .countdown {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .countdown span {
      color: var(--accent-y);
      font-weight: 700;
    }

    .ref-badge {
      margin-top: 8px;
      font-size: 11px;
      color: #2A3F60;
    }

    /* קו מפריד תחתון */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0 16px;
    }

    .footer-note {
      font-size: 11px;
      color: #2A3F60;
    }

    /* 3 נקודות צבעוניות קטנות בתחתית */
    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .dot1 { background: var(--accent-r); }
    .dot2 { background: var(--accent-o); }
    .dot3 { background: var(--accent-y); }
  </style>
</head>
<body>

  <div class="card">
    <div class="top-stripe"></div>

    <div class="card-body">
      <div class="icon-wrap">📄</div>

      <h1>PDF Merger Pro</h1>
      <p class="tagline">מיזוג, עריכה, חתימה וסיסמה על PDF<br/>ישירות מהנייד — בקלות ובמהירות</p>

      <div class="features">
        <span class="feat">✂️ מיזוג</span>
        <span class="feat">✍️ חתימה</span>
        <span class="feat">🔒 הצפנה</span>
      </div>

      <a id="storeBtn" class="btn" href="#">הורד חינם ב-Google Play</a>

      <div class="countdown">מעביר אוטומטית בעוד <span id="sec">3</span> שניות...</div>
      <div class="ref-badge" id="refBadge"></div>

      <div class="divider"></div>
      <div class="footer-note">PDF Merger Pro · com.legaldan.pdfmergerpro</div>

      <div class="dots">
        <div class="dot dot1"></div>
        <div class="dot dot2"></div>
        <div class="dot dot3"></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    let marketerId = params.get('ref') || '';

    if (!marketerId) {
      const parts = window.location.pathname.split('/').filter(Boolean);
      const joinIdx = parts.indexOf('join');
      if (joinIdx !== -1 && parts[joinIdx + 1]) marketerId = parts[joinIdx + 1];
    }

    if (!marketerId) marketerId = 'direct';

    const packageName = 'com.legaldan.pdfmergerpro';
    const referrer    = encodeURIComponent('utm_source=affiliate&utm_medium=referral&utm_campaign=' + marketerId);
    const playUrl     = `https://play.google.com/store/apps/details?id=${packageName}&referrer=${referrer}`;

    document.getElementById('storeBtn').href = playUrl;

    if (marketerId !== 'direct') {
      document.getElementById('refBadge').textContent = '🔗 ref: ' + marketerId;
    }

    let sec = 3;
    const secEl = document.getElementById('sec');
    const timer = setInterval(() => {
      sec--;
      secEl.textContent = sec;
      if (sec <= 0) { clearInterval(timer); window.location.href = playUrl; }
    }, 1000);
  </script>
</body>
</html>
